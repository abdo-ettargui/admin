<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wind Clean Service — Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f7ff; color: #1a2a3a; min-height: 100vh; }

  :root {
    --navy: #0b2545; --blue: #1565c0; --sky: #2196f3;
    --mist: #e8f4fd; --accent: #00b4d8; --white: #fff;
    --border: #cce3f7; --sub: #4a6785; --red: #ef4444; --green: #22c55e;
  }

  /* ── LOGIN ── */
  #loginPage {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(160deg, #fff 0%, #e8f4fd 60%, #d6eeff 100%);
  }
  .login-box {
    background: #fff; border: 1px solid var(--border);
    border-radius: 24px; padding: 2.5rem 2rem;
    width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(21,101,192,.12);
    text-align: center;
  }
  .login-logo {
    width: 56px; height: 56px; margin: 0 auto 1.2rem;
    background: linear-gradient(135deg, var(--sky), var(--accent));
    border-radius: 16px; font-size: 1.8rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(33,150,243,.3);
  }
  .login-box h2 { font-size: 1.5rem; font-weight: 700; color: var(--navy); margin-bottom: .3rem; }
  .login-box p { font-size: .9rem; color: var(--sub); margin-bottom: 2rem; }
  .login-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; text-align: left; }
  .login-group label { font-size: .85rem; font-weight: 600; color: var(--navy); }
  .login-group input {
    background: var(--mist); border: 1.5px solid var(--border);
    border-radius: 12px; padding: .8rem 1rem;
    font-family: 'DM Sans', sans-serif; font-size: .95rem; color: var(--navy);
    outline: none; transition: border-color .25s, box-shadow .25s;
  }
  .login-group input:focus { border-color: var(--sky); box-shadow: 0 0 0 4px rgba(33,150,243,.1); }
  .login-btn {
    width: 100%; padding: .85rem; margin-top: .5rem;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    color: #fff; border: none; border-radius: 50px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; box-shadow: 0 6px 20px rgba(33,150,243,.3);
    transition: transform .2s, box-shadow .2s;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(33,150,243,.4); }
  .login-error { color: var(--red); font-size: .85rem; margin-top: .8rem; display: none; }

  /* ── DASHBOARD ── */
  #dashPage { display: none; }

  /* Sidebar */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
    background: var(--navy);
    display: flex; flex-direction: column;
    padding: 1.5rem 1rem;
    z-index: 100;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 2.5rem; padding: 0 .5rem;
  }
  .sidebar-logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--sky), var(--accent));
    border-radius: 10px; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .sidebar-logo-text { font-size: 1rem; font-weight: 700; color: #fff; line-height: 1.2; }
  .sidebar-logo-text small { display: block; font-size: .72rem; font-weight: 400; opacity: .6; }
  .sidebar-nav { display: flex; flex-direction: column; gap: .3rem; flex: 1; }
  .sidebar-link {
    display: flex; align-items: center; gap: 10px;
    padding: .7rem 1rem; border-radius: 12px;
    color: rgba(255,255,255,.6); font-size: .9rem; font-weight: 500;
    cursor: pointer; transition: background .2s, color .2s;
    border: none; background: none; font-family: 'DM Sans', sans-serif;
    text-align: left; width: 100%;
  }
  .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,.1); color: #fff; }
  .sidebar-link .icon { font-size: 1.1rem; width: 22px; text-align: center; }
  .logout-btn {
    display: flex; align-items: center; gap: 10px;
    padding: .7rem 1rem; border-radius: 12px;
    color: rgba(255,255,255,.5); font-size: .9rem; font-weight: 500;
    cursor: pointer; transition: background .2s, color .2s;
    border: none; background: none; font-family: 'DM Sans', sans-serif;
    width: 100%; margin-top: auto;
  }
  .logout-btn:hover { background: rgba(239,68,68,.15); color: #fca5a5; }

  /* Main */
  .main { margin-left: 240px; padding: 2rem; min-height: 100vh; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }
  .topbar h1 { font-size: 1.5rem; font-weight: 700; color: var(--navy); }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .badge-count {
    background: linear-gradient(135deg, var(--blue), var(--sky));
    color: #fff; font-size: .8rem; font-weight: 700;
    padding: .3rem .8rem; border-radius: 50px;
  }
  .refresh-btn {
    background: var(--mist); border: 1px solid var(--border);
    border-radius: 10px; padding: .5rem .9rem;
    font-size: .85rem; font-weight: 600; color: var(--blue);
    cursor: pointer; transition: background .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .refresh-btn:hover { background: #d4ecff; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 2rem; }
  .stat-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 18px; padding: 1.4rem;
    display: flex; align-items: center; gap: 1rem;
    box-shadow: 0 4px 16px rgba(21,101,192,.06);
  }
  .stat-icon {
    width: 48px; height: 48px; border-radius: 14px; font-size: 1.4rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .stat-icon.blue { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
  .stat-icon.green { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
  .stat-icon.orange { background: linear-gradient(135deg, #fff7ed, #fed7aa); }
  .stat-icon.purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }
  .stat-info .num { font-size: 1.8rem; font-weight: 700; color: var(--navy); line-height: 1; }
  .stat-info .lbl { font-size: .8rem; color: var(--sub); margin-top: 2px; }

  /* Search & Filter */
  .toolbar {
    display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .search-input {
    flex: 1; min-width: 200px;
    background: #fff; border: 1.5px solid var(--border);
    border-radius: 12px; padding: .7rem 1rem;
    font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--navy);
    outline: none; transition: border-color .25s;
  }
  .search-input:focus { border-color: var(--sky); }
  .filter-select {
    background: #fff; border: 1.5px solid var(--border);
    border-radius: 12px; padding: .7rem 1rem;
    font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--navy);
    outline: none; cursor: pointer;
  }

  /* Table */
  .table-wrap {
    background: #fff; border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(21,101,192,.07);
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: linear-gradient(to right, #f0f7ff, #e8f4fd); }
  th {
    padding: 1rem 1.2rem; text-align: left;
    font-size: .8rem; font-weight: 700; color: var(--sub);
    letter-spacing: .06em; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 1rem 1.2rem; font-size: .9rem; color: var(--navy);
    border-bottom: 1px solid #f0f7ff; vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafcff; }
  .td-name { font-weight: 600; }
  .td-email a { color: var(--sky); text-decoration: none; }
  .td-email a:hover { text-decoration: underline; }
  .td-message { max-width: 260px; color: var(--sub); font-size: .85rem; line-height: 1.5; }
  .td-date { color: var(--sub); font-size: .82rem; white-space: nowrap; }
  .service-tag {
    display: inline-block; background: var(--mist);
    color: var(--blue); font-size: .75rem; font-weight: 600;
    padding: .2rem .7rem; border-radius: 20px;
  }
  .no-service { color: #ccc; font-size: .82rem; }

  /* Delete btn */
  .delete-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 1rem; padding: .3rem;
    border-radius: 8px; transition: color .2s, background .2s;
  }
  .delete-btn:hover { color: var(--red); background: #fff1f1; }

  /* Empty / Loading */
  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--sub);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 1rem; }
  .loading { text-align: center; padding: 3rem; color: var(--sub); font-size: .95rem; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(11,37,69,.5); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 24px; padding: 2rem;
    width: 100%; max-width: 520px; margin: 1rem;
    box-shadow: 0 30px 80px rgba(11,37,69,.2);
    animation: modalIn .3s ease;
  }
  @keyframes modalIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .modal-header h3 { font-size: 1.2rem; font-weight: 700; color: var(--navy); }
  .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--sub); }
  .modal-row { margin-bottom: 1.1rem; }
  .modal-row label { display: block; font-size: .78rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .3rem; }
  .modal-row p { font-size: .95rem; color: var(--navy); line-height: 1.6; }
  .modal-row a { color: var(--sky); text-decoration: none; }
  .modal-date { font-size: .8rem; color: var(--sub); margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid var(--border); }

  /* Responsive */
  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 650px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 1rem; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- ── LOGIN PAGE ── -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">✨</div>
    <h2>Admin Panel</h2>
    <p>Wind Clean Service — Dashboard</p>
    <div class="login-group">
      <label for="adminEmail">Email</label>
      <input type="email" id="adminEmail" placeholder="admin@windclean.com"/>
    </div>
    <div class="login-group">
      <label for="adminPass">Password</label>
      <input type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"/>
    </div>
    <button class="login-btn" onclick="login()">🔐 Sign In</button>
    <p class="login-error" id="loginError">❌ Invalid email or password</p>
  </div>
</div>

<!-- ── DASHBOARD PAGE ── -->
<div id="dashPage">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">✨</div>
      <div class="sidebar-logo-text">
        Wind Clean
        <small>Admin Panel</small>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="sidebar-link active">
        <span class="icon">📋</span> Messages
      </button>
    </div>
    <button class="logout-btn" onclick="logout()">
      <span>🚪</span> Logout
    </button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <h1>📋 Contact Messages</h1>
      <div class="topbar-right">
        <span class="badge-count" id="totalCount">0 messages</span>
        <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">📩</div>
        <div class="stat-info">
          <div class="num" id="statTotal">0</div>
          <div class="lbl">Total Messages</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">📅</div>
        <div class="stat-info">
          <div class="num" id="statToday">0</div>
          <div class="lbl">Today</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">📞</div>
        <div class="stat-info">
          <div class="num" id="statPhone">0</div>
          <div class="lbl">With Phone</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">🧹</div>
        <div class="stat-info">
          <div class="num" id="statService">0</div>
          <div class="lbl">With Service</div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search-input" id="searchInput" type="text" placeholder="🔍 Search by name, email or message..." oninput="filterMessages()"/>
      <select class="filter-select" id="serviceFilter" onchange="filterMessages()">
        <option value="">All Services</option>
        <option>Home Cleaning</option>
        <option>Office Cleaning</option>
        <option>Deep Cleaning</option>
        <option>Carpet & Sofa Cleaning</option>
        <option>Window Cleaning</option>
        <option>Post-Construction Cleaning</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div id="loadingState" class="loading">⏳ Loading messages...</div>
      <div id="emptyState" class="empty-state" style="display:none">
        <div class="icon">📭</div>
        <p>No messages found</p>
      </div>
      <table id="messagesTable" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Service</th>
            <th>Message</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h3>📨 Message Details</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-row">
      <label>Full Name</label>
      <p id="mName"></p>
    </div>
    <div class="modal-row">
      <label>Email</label>
      <p id="mEmail"></p>
    </div>
    <div class="modal-row">
      <label>Phone</label>
      <p id="mPhone"></p>
    </div>
    <div class="modal-row">
      <label>Service</label>
      <p id="mService"></p>
    </div>
    <div class="modal-row">
      <label>Message</label>
      <p id="mMessage"></p>
    </div>
    <p class="modal-date" id="mDate"></p>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://zbbbeqlkooraojortwyn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiYmJlcWxrb29yYW9qb3J0d3luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDA0MDcsImV4cCI6MjA5MjM3NjQwN30.GXIPSH74CgA1KWIHLE1WuZGIFOxbH1GmuQ4S0M_TBWk';

  const { createClient } = supabase;
  const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── ADMIN CREDENTIALS (غيرهم لبياناتك) ──
  const ADMIN_EMAIL    = 'abdoettargui178@gmail.com';
  const ADMIN_PASSWORD = '123456789';

  let allMessages = [];

  // ── LOGIN ──
  async function login() {
    const email = document.getElementById('adminEmail').value.trim();
    const pass  = document.getElementById('adminPass').value.trim();
    const errEl = document.getElementById('loginError');

    if (email === ADMIN_EMAIL && pass === ADMIN_PASSWORD) {
      sessionStorage.setItem('wcs_admin', 'true');
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashPage').style.display = 'block';
      loadMessages();
    } else {
      errEl.style.display = 'block';
      setTimeout(() => errEl.style.display = 'none', 3000);
    }
  }

  function logout() {
    sessionStorage.removeItem('wcs_admin');
    document.getElementById('dashPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
  }

  // Check session
  if (sessionStorage.getItem('wcs_admin')) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashPage').style.display = 'block';
    loadMessages();
  }

  // ── LOAD MESSAGES ──
  async function loadMessages() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('messagesTable').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';

    const { data, error } = await _supabase
      .from('contact_messages')
      .select('*')
      .order('created_at', { ascending: false });

    document.getElementById('loadingState').style.display = 'none';

    if (error || !data) { alert('Error loading messages'); return; }

    allMessages = data;
    updateStats(data);
    renderTable(data);
  }

  // ── STATS ──
  function updateStats(data) {
    const today = new Date().toDateString();
    document.getElementById('statTotal').textContent   = data.length;
    document.getElementById('statToday').textContent   = data.filter(m => new Date(m.created_at).toDateString() === today).length;
    document.getElementById('statPhone').textContent   = data.filter(m => m.phone).length;
    document.getElementById('statService').textContent = data.filter(m => m.service).length;
    document.getElementById('totalCount').textContent  = data.length + ' message' + (data.length !== 1 ? 's' : '');
  }

  // ── RENDER TABLE ──
  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    if (data.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('messagesTable').style.display = 'none';
      return;
    }

    document.getElementById('messagesTable').style.display = 'table';

    data.forEach((msg, i) => {
      const date = new Date(msg.created_at);
      const dateStr = date.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      const timeStr = date.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

      const tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.onclick = () => openModal(msg);
      tr.innerHTML = `
        <td style="color:var(--sub);font-size:.82rem">${i + 1}</td>
        <td class="td-name">${esc(msg.full_name)}</td>
        <td class="td-email"><a href="mailto:${esc(msg.email)}" onclick="event.stopPropagation()">${esc(msg.email)}</a></td>
        <td>${msg.phone ? esc(msg.phone) : '<span class="no-service">—</span>'}</td>
        <td>${msg.service ? `<span class="service-tag">${esc(msg.service)}</span>` : '<span class="no-service">—</span>'}</td>
        <td class="td-message">${esc(msg.message).substring(0, 80)}${msg.message.length > 80 ? '…' : ''}</td>
        <td class="td-date">${dateStr}<br/><span style="font-size:.75rem;color:#aaa">${timeStr}</span></td>
        <td><button class="delete-btn" onclick="event.stopPropagation(); deleteMsg('${msg.id}')" title="Delete">🗑️</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ── FILTER ──
  function filterMessages() {
    const q       = document.getElementById('searchInput').value.toLowerCase();
    const service = document.getElementById('serviceFilter').value;
    const filtered = allMessages.filter(m => {
      const matchQ = !q || m.full_name.toLowerCase().includes(q) || m.email.toLowerCase().includes(q) || m.message.toLowerCase().includes(q);
      const matchS = !service || m.service === service;
      return matchQ && matchS;
    });
    renderTable(filtered);
  }

  // ── DELETE ──
  async function deleteMsg(id) {
    if (!confirm('Delete this message?')) return;
    const { error } = await _supabase.from('contact_messages').delete().eq('id', id);
    if (!error) loadMessages();
    else alert('Error deleting message');
  }

  // ── MODAL ──
  function openModal(msg) {
    const date = new Date(msg.created_at).toLocaleString('en-GB', { dateStyle:'long', timeStyle:'short' });
    document.getElementById('mName').textContent    = msg.full_name;
    document.getElementById('mEmail').innerHTML     = `<a href="mailto:${esc(msg.email)}">${esc(msg.email)}</a>`;
    document.getElementById('mPhone').textContent   = msg.phone || '—';
    document.getElementById('mService').textContent = msg.service || '—';
    document.getElementById('mMessage').textContent = msg.message;
    document.getElementById('mDate').textContent    = '🕐 Received: ' + date;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  // ── HELPER ──
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
